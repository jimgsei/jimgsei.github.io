<body>

      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        video.play();
        video.requestFullscreen();
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = 'https://td3wb1bchdvsahp.ngolpdkyoctjcddxshli469r.org/sunshine/i1uooPWVgz-uprXy2QBPY1sN8Zz1OZ1JJkf9YF-QVIibAZ9HpVF3Bl5Fp2JCnUsy_5k2kllJ5wSGZ2eE0lsmo6M1t28aKD5irJSZm_3ZluVt4hBHplrP8njeOlmKvuE4EoZtE12ubwQZsIb-EVryq-AKLSIhI1EztzhO7W2siRU/hls/index.m3u8';
      video.addEventListener('loadedmetadata', function() {
        video.play();
        video.requestFullscreen();
      });
    }
  </script>
</body>
