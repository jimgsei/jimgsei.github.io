<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 | Jimgsey</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Estilo para el contenedor principal */
    .container {
      text-align: center; /* Centrar contenido */
    }

    /* Estilo para la tabla */
    table {
      border-collapse: collapse;
      width: 10cm; /* Ancho de la tabla */
      margin: 0 auto; /* Centrar la tabla en el contenedor */
    }

    th, td {
      border: none; /* Sin bordes */
      padding: 6px; /* Espaciado interno */
      text-align: left; /* Alineación del texto */
    }

    /* Estilo para la cabecera de la tabla */
    th {
      font-weight: bold; /* Texto en negrita */
    }

    /* Estilo para la separación entre la tabla y el video */
    .separator {
      margin-top: 20px; /* Margen superior */
    }
  </style>
</head>
<body>
  <header>
    
  </header>
  <main>
    <div class="container">
      <h1>F1</h1>

      <div id="info-container">
        <table>
          <thead>
            <tr>
              <th>Piloto</th>
              <th>Puesto</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody>
            <tr id="driver-14">
              <td>F. Alonso</td>
              <td id="position-14">Cargando...</td>
              <td id="date-14">Cargando...</td>
            </tr>
            <tr id="driver-55">
              <td>C. Sainz</td>
              <td id="position-55">Cargando...</td>
              <td id="date-55">Cargando...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div class="separator"></div>

      <div class="video-container">
        <iframe width="560" height="315" src="https://live.sportsnews.id/p/dazn-f1.html" allow="encrypted-media" scrolling="no" frameborder="0" height="100%" width="100%" gesture="media" allowfullscreen="allowfullscreen"></iframe>
      </div>
    </div>

    <div class="creditos">
      <span>Creado por Jimgsey</span>
      <a href="https://github.com/jimgsey" target="_blank">
        <img src="https://img.icons8.com/ios/50/000000/github.png" alt="Github">
      </a>
    </div>
  </main>

  <script>
    async function fetchDriverPosition(driverNumber, positionElementId, dateElementId) {
      try {
        const response = await fetch(`https://api.openf1.org/v1/position?meeting_key=latest&driver_number=${driverNumber}&session_key=latest`);
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        const data = await response.json();
        console.log(`Respuesta de la API para el conductor ${driverNumber}:`, data); // Log the whole JSON response

        // Extract position and date
        let position;
        let date;

        // Check if the top level object has the properties
        if (data.position !== undefined) {
          position = data.position;
        } else {
          // Traverse nested structures if necessary
          for (const key in data) {
            if (data[key] && typeof data[key] === 'object') {
              if (data[key].position !== undefined) {
                position = data[key].position;
              }
              if (data[key].date !== undefined) {
                date = data[key].date;
              }
            }
          }
        }

        // If position is an array, take the last element
        if (Array.isArray(position)) {
          position = position[position.length - 1];
        }

        // If date is an array, take the last element
        if (Array.isArray(date)) {
          date = date[date.length - 1];
        }

        // Convert date to Madrid time if date exists
        const madridTime = date ? new Date(date).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' }) : undefined;

        // Display position and date
        if (position !== undefined) {
          document.getElementById(positionElementId).textContent = position;
        } else {
          document.getElementById(positionElementId).textContent = `Error ${driverNumber}`;
        }

        if (madridTime !== undefined) {
          document.getElementById(dateElementId).textContent = madridTime;
        } else {
          document.getElementById(dateElementId).textContent = `Error ${driverNumber}`;
        }
      } catch (error) {
        console.error(`Error fetching data for driver ${driverNumber}:`, error);
        document.getElementById(positionElementId).textContent = `Error ${driverNumber}`;
        document.getElementById(dateElementId).textContent = '';
      }
    }

    // Fetch the positions for both drivers when the page loads
    window.onload = function() {
      fetchDriverPosition(14, 'position-14', 'date-14');
      fetchDriverPosition(55, 'position-55', 'date-55');
      setInterval(function() {
        fetchDriverPosition(14, 'position-14', 'date-14');
        fetchDriverPosition(55, 'position-55', 'date-55');
      }, 3000); // Reload positions and dates every 20 seconds (20000 milliseconds)
    };
  </script>
</body>
</html>
