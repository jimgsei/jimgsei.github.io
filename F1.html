<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 | Jimgsey</title>
  <link rel="stylesheet" href="style.css">
  
  <!-- Castable Video script -->
  <script src="https://unpkg.com/castable-video"></script>
  
  <style>
    /* Styling for the video container */
    .video-container {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 56.25%; /* Aspect ratio 16:9 */
    }

    .video-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    /* Styling for the Cast button */
    #castButton {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      z-index: 1000;
    }

    #castButton:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <header>
    <!-- Header content goes here -->
  </header>
  <main>
    <div class="video-container">
      <h1>F1</h1>
      <div class="separador">
        <iframe id="videoFrame" src="https://live.sportsnews.id/p/dazn-f1.html" allow="encrypted-media" scrolling="no" frameborder="0" gesture="media" allowfullscreen="allowfullscreen"></iframe>
      </div>
      <div class="creditos">
        <span>Creado por Jimgsey</span>
        <a href="https://github.com/jimgsey" target="_blank">
          <img src="https://img.icons8.com/ios/50/000000/github.png" alt="Github">
        </a>
      </div>
      <!-- Cast button -->
      <button id="castButton">Enviar a Chromecast</button>
    </div>
  </main>

  <script>
    // Initialize the Castable Video library
    castablevideo.initialize();

    // Add event listener to the Cast button
    document.getElementById('castButton').addEventListener('click', function() {
      var videoFrame = document.getElementById('videoFrame');
      castablevideo.cast(videoFrame);
    });
  </script>
</body>
</html>
