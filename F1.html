  <script>
    async function fetchDriverPosition(driverNumber, positionElementId, dateElementId) {
      try {
        const response = await fetch(`https://api.openf1.org/v1/position?meeting_key=latest&driver_number=${driverNumber}&session_key=latest`);
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        const data = await response.json();
        console.log(`Respuesta de la API para el conductor ${driverNumber}:`, data); // Log the whole JSON response

        // Extract position and date
        let position;
        let date;

        // Check if the top level object has the properties
        if (data.position !== undefined) {
          position = data.position;
        } else {
          // Traverse nested structures if necessary
          for (const key in data) {
            if (data[key] && typeof data[key] === 'object') {
              if (data[key].position !== undefined) {
                position = data[key].position;
              }
              if (data[key].date !== undefined) {
                date = data[key].date;
              }
            }
          }
        }

        // If position is an array, take the last element
        if (Array.isArray(position)) {
          position = position[position.length - 1];
        }

        // If date is an array, take the last element
        if (Array.isArray(date)) {
          date = date[date.length - 1];
        }

        // Convert date to Madrid time if date exists
        const madridTime = date ? new Date(date).toLocaleString('es-ES', { timeZone: 'Europe/Madrid' }) : undefined;

        // Display position and date
        if (position !== undefined) {
          document.getElementById(positionElementId).textContent = position;
        } else {
          document.getElementById(positionElementId).textContent = `Error ${driverNumber}`;
        }

        if (madridTime !== undefined) {
          document.getElementById(dateElementId).textContent = madridTime;
        } else {
          document.getElementById(dateElementId).textContent = `Error ${driverNumber}`;
        }
      } catch (error) {
        console.error(`Error fetching data for driver ${driverNumber}:`, error);
        document.getElementById(positionElementId).textContent = `Error ${driverNumber}`;
        document.getElementById(dateElementId).textContent = '';
      }
    }

    async function fetchCurrentRaceData() {
      try {
        const response = await fetch('https://ergast.com/api/f1/current/next.json');
        const data = await response.json();
        const race = data.MRData.RaceTable.Races[0];

        // Mostrar el nombre del próximo Gran Premio
        displayRaceName(race.raceName);
      } catch (error) {
        document.getElementById('race-name').textContent = 'Hubo un error al obtener los datos del Gran Premio actual de F1.';
        console.error('Error fetching the data:', error);
      }
    }

    function displayRaceName(raceName) {
      const content = document.getElementById('race-name');
      content.innerHTML = `<h2>${raceName}</h2>`;
    }

    async function fetchLastF1Qualifying() {
      try {
        const response = await fetch('https://ergast.com/api/f1/current/last/qualifying.json');
        const data = await response.json();
        
        // Extraer información de la última clasificación
        const raceName = data.MRData.RaceTable.Races[0].raceName;
        const qualifyingResults = data.MRData.RaceTable.Races[0].QualifyingResults;
        
        // Mostrar el nombre del Gran Premio en la tabla de clasificación
        document.getElementById('qualifying-table').rows[0].cells[0].textContent = raceName;

        // Construir la tabla con los resultados de la clasificación
        const tableBody = document.getElementById('qualifying-results');
        let html = '';
        qualifyingResults.forEach(result => {
          const driverName = `${result.Driver.givenName} ${result.Driver.familyName}`;
          const position = result.position;
          const isFernandoOrCarlos = driverName.includes('Fernando Alonso') || driverName.includes('Carlos Sainz');
          html += `<tr${isFernandoOrCarlos ? ' class="highlight"' : ''}><td>${position}</td><td>${driverName}</td></tr>`;
        });
        tableBody.innerHTML = html;
      } catch (error) {
        console.error('Error fetching last F1 qualifying:', error);
        document.getElementById('qualifying-results').textContent = 'Hubo un error al obtener la información de la última clasificación de F1.';
      }
    }

    async function fetchChampionshipStandings() {
      try {
        const response = await fetch('https://ergast.com/api/f1/current/driverStandings.json');
        const data = await response.json();

        // Extraer información de la clasificación del campeonato
        const standings = data.MRData.StandingsTable.StandingsLists[0].DriverStandings;

        // Construir la tabla con los resultados del campeonato
        const tableBody = document.getElementById('championship-results');
        let html = '';
        standings.forEach(standing => {
          const position = standing.position;
          const driverName = `${standing.Driver.givenName} ${standing.Driver.familyName}`;
          const points = standing.points;
          const isFernandoOrCarlos = driverName.includes('Fernando Alonso') || driverName.includes('Carlos Sainz');
          html += `<tr${isFernandoOrCarlos ? ' class="highlight"' : ''}><td>${position}</td><td>${driverName}</td><td>${points}</td></tr>`;
        });
        tableBody.innerHTML = html;
      } catch (error) {
        console.error('Error fetching championship standings:', error);
        document.getElementById('championship-results').textContent = 'Hubo un error al obtener la clasificación del campeonato de F1.';
      }
    }

    async function fetchCircuitInfo() {
      try {
        const response = await fetch('https://ergast.com/api/f1/current/next.json');
        const data = await response.json();
        const circuitId = data.MRData.RaceTable.Races[0].Circuit.circuitId;
        const circuitResponse = await fetch(`https://ergast.com/api/f1/circuits/${circuitId}.json`);
        const circuitData = await circuitResponse.json();
        const circuitName = circuitData.MRData.CircuitTable.Circuits[0].circuitName;
        const circuitLocation = circuitData.MRData.CircuitTable.Circuits[0].Location.locality;
        const circuitCountry = circuitData.MRData.CircuitTable.Circuits[0].Location.country;

        const content = document.getElementById('circuit-info');
        content.innerHTML = `
          <h2>${circuitName}</h2>
          <p>${circuitLocation}, ${circuitCountry}</p>
          <img src="https://www.countryflags.io/${circuitCountry}/flat/64.png" alt="${circuitCountry}">
        `;
      } catch (error) {
        console.error('Error fetching circuit info:', error);
        document.getElementById('circuit-info').textContent = 'Hubo un error al obtener la información del circuito.';
      }
    }

    async function fetchUpcomingRaces() {
  try {
    const response = await fetch('https://ergast.com/api/f1/current.json');
    const data = await response.json();
    const races = data.MRData.RaceTable.Races;

    const today = new Date();
    const upcomingRaces = races.filter(race => new Date(race.date) > today);

    const raceContainer = document.getElementById('upcoming-races');
    raceContainer.innerHTML = '';

    upcomingRaces.forEach(race => {
      const raceName = race.raceName;
      const circuitName = race.Circuit.circuitName;
      const date = new Date(race.date);

      const raceCard = document.createElement('div');
      raceCard.classList.add('race-card');
      raceCard.innerHTML = `
        <div class="race-name">${raceName}</div>
        <div class="race-info">${circuitName}</div>
        <div class="race-info">${date.toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
      `;
      raceContainer.appendChild(raceCard);
    });
  } catch (error) {
    console.error('Error fetching upcoming races:', error);
    const raceContainer = document.getElementById('upcoming-races');
    raceContainer.textContent = 'Hubo un error al obtener la información de los próximos circuitos.';
  }
}


    async function fetchData() {
      await Promise.all([
        fetchCurrentRaceData(),
        fetchDriverPosition(14, 'position-14', 'date-14'),
        fetchDriverPosition(55, 'position-55', 'date-55'),
        fetchLastF1Qualifying(),
        fetchChampionshipStandings(),
        fetchCircuitInfo(),
        fetchUpcomingRaces()
      ]);
    }

        async function fetchCircuitData() {
            const response = await fetch('https://ergast.com/api/f1/current/last/circuits.json');
            const data = await response.json();
            return data.MRData.CircuitTable.Circuits[0]; // Asumiendo que la respuesta es un array y tomamos el primer elemento
        }

        async function fetchRaceData() {
            const response = await fetch('https://ergast.com/api/f1/current/last.json');
            const data = await response.json();
            return data.MRData.RaceTable.Races[0]; // Asumiendo que la respuesta es un array y tomamos el primer elemento
        }

        function updateDataBox(circuitData, raceData) {
            const dataBox = document.getElementById('dataBox');
            dataBox.innerHTML = `
                <p> ${circuitData.circuitName}</p>
                <p> ${circuitData.Location.locality}</p>
                <p> ${circuitData.Location.country}</p>
                <p><strong>Año:</strong> ${raceData.season}</p>
                <p><strong>Nº:</strong> ${raceData.round}</p>
                <p> <a href="${circuitData.url}" target="_blank">${circuitData.url}</a></p>
            `;
        }

        async function loadData() {
            const circuitData = await fetchCircuitData();
            const raceData = await fetchRaceData();
            updateDataBox(circuitData, raceData);
        }
        



    document.addEventListener('DOMContentLoaded', function() {
            fetchData();
            loadData();

        });
  </script>
