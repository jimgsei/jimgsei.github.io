<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 | Jimgsey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    
  </header>
  <main>
    <div class="video-container">
      <h1>F1</h1>

      <div class="separador">
        <iframe id="video-frame" width="560" height="315" src="https://live.sportsnews.id/p/dazn-f1.html" allow="encrypted-media" scrolling="no" frameborder="0" height="100%" width="100%" gesture="media" allowfullscreen="allowfullscreen"></iframe>
      </div>

      <div class="creditos">
        <span>Creado por Jimgsey</span>
        <a href="https://github.com/jimgsey" target="_blank">
          <img src="https://img.icons8.com/ios/50/000000/github.png" alt="Github">
        </a>
        <button onclick="captureVideo()">Extraer Video</button>
      </div>
    </div>

    <script>
      // Función para extraer el video del navegador
      function captureVideo() {
        var videoFrame = document.getElementById('video-frame');
        var canvas = document.createElement('canvas');
        canvas.width = videoFrame.clientWidth;
        canvas.height = videoFrame.clientHeight;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(videoFrame, 0, 0, canvas.width, canvas.height);

        // Crear un enlace de descarga
        var link = document.createElement('a');
        link.download = 'captured_video.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      }
    </script>
  </main>
</body>
</html>
