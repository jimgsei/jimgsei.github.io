<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 | Jimgsey</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    
  </header>
  <main>
    <div class="video-container">
      <h1>F1</h1>

      <div class="separador">
        <video id="video-player" width="560" height="315" controls>
          <source src="https://live.sportsnews.id/p/dazn-f1.html" type="video/mp4">
          Your browser does not support the video tag.
        </video>
      </div>

      <div class="creditos">
        <span>Creado por Jimgsey</span>
        <a href="https://github.com/jimgsey" target="_blank">
          <img src="https://img.icons8.com/ios/50/000000/github.png" alt="Github">
        </a>
        <button onclick="togglePiP()">Ver en Picture-in-Picture</button>
      </div>
    </div>

    <script>
      var videoPlayer = document.getElementById('video-player');

      // Función para activar/desactivar Picture-in-Picture
      function togglePiP() {
        if (document.pictureInPictureElement) {
          document.exitPictureInPicture()
            .catch(error => {
              console.error('Error al salir de Picture-in-Picture: ', error);
            });
        } else {
          if (videoPlayer.readyState === 4) { // Check if video is loaded
            videoPlayer.requestPictureInPicture()
              .catch(error => {
                console.error('Error al iniciar Picture-in-Picture: ', error);
              });
          }
        }
      }
    </script>
  </main>
</body>
</html>
