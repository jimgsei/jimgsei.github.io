<!DOCTYPE html>
<html>
<head>
  <title>M3U8 Player with HLS.js</title>
</head>
<body>
  <video id="myVideo" controls></video>
  <p id="error-message"></p>

  <!-- Incluir HLS.js desde CDN -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('myVideo');
    const errorMessageElement = document.getElementById('error-message');
    const m3u8Url = 'http://468515598262165419.ofgd919.xyz:80/live/zh813567/VujHjvynTP/165419.m3u8'; // Reemplaza con tu URL

    // Verificamos si el navegador soporta HLS.js
    if (Hls.isSupported()) {
      const hls = new Hls({ debug: true });  // Habilitamos la depuración
      hls.loadSource(m3u8Url);
      hls.attachMedia(video);
      
      // Escuchamos eventos de error en HLS.js
      hls.on(Hls.Events.ERROR, function(event, data) {
        console.error('HLS.js error:', data);
        errorMessageElement.textContent = `Error: ${data.type}, Details: ${data.details}`;  // Mostramos el tipo de error
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Si HLS.js no es soportado, usamos la funcionalidad nativa del navegador (Safari, por ejemplo)
      video.src = m3u8Url;
      video.addEventListener('error', (event) => {
        console.error('Video error:', event.target.error.message);
        errorMessageElement.textContent = `Error: ${event.target.error.message}`;
      });
    } else {
      errorMessageElement.textContent = 'M3U8 playback is not supported in this browser.';
    }
  </script>
</body>
</html>
