<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor HLS.js</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        video {
            width: 80%;
            max-width: 800px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<h1>Pagina en local</h1>
<video id="video" controls></video>

<script>
    const video = document.getElementById('video');
    const videoSrc = 'http://468515598262165419.ofgd919.xyz:80/live/zh813567/VujHjvynTP/165419.m3u8';

    if (Hls.isSupported()) {
        const hls = new Hls();

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, function() {
            video.play();
        });

        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.fatal) {
                switch (data.fatal) {
                    case Hls.ErrorTypes.NETWORK_ERROR:
                        console.error('Error de red:', data);
                        break;
                    case Hls.ErrorTypes.MEDIA_ERROR:
                        console.error('Error de media:', data);
                        break;
                    case Hls.ErrorTypes.OTHER_ERROR:
                        console.error('Otro error:', data);
                        break;
                }
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', function() {
            video.play();
        });
    } else {
        console.error('HLS no es soportado en este navegador.');
    }
</script>

</body>
</html>
