  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .video-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .dropdown {
      position: fixed;
      bottom: 20px;
      z-index: 1000;
      background-color: rgba(0, 0, 0, 0.8);
      border-radius: 10px;
      padding: 10px;
      transition: opacity 0.3s ease;
      opacity: 0;
    }

    .dropdown.visible {
      opacity: 1;
    }

    .dropbtn {
      background-color: #006F62;
      color: white;
      padding: 10px 20px;
      border: 2px solid white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .dropbtn:hover {
      background-color: #005f56;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #333;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 1;
      border-radius: 5px;
      overflow: hidden;
    }

    .dropdown-content button {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      background-color: #444;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    .dropdown-content button:hover {
      background-color: #555;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .submenu {
      display: none;
      background-color: #222;
      padding: 5px;
      margin-top: 5px;
      border-radius: 5px;
      max-height: 200px; /* Altura máxima con scroll */
      overflow-y: auto; /* Scroll vertical */
    }

    .submenu button {
      padding: 10px 16px;
      text-align: left;
      width: 100%;
      background-color: #333;
      border: none;
      color: white;
      cursor: pointer;
    }

    .submenu button:hover {
      background-color: #444;
    }

    /* Estilo para resaltar el menú seleccionado */
    .selected {
      background-color: rgba(0, 96, 86, 0.8) !important; /* Verde oscuro semitransparente */
    }
  </style>
</head>

  <script>
    const baseUrl = 'https://nebunexa.co/clappr/?id=';
    const otherBaseUrl = 'https://corsmirror.com/v1?url=https://streamdz1.xyz/player/embed2.php?channel=';

    function loadVideo(path) {
      const videoFrame = document.getElementById('videoFrame');
      videoFrame.src = baseUrl + path;
      hideDropdown(); // Ocultar el botón al cambiar de canal
    }

    function loadOtherChannel(channel) {
      const videoFrame = document.getElementById('videoFrame');
      videoFrame.src = otherBaseUrl + channel;
      hideDropdown(); // Ocultar el botón al cambiar de canal
    }

    // Ocultar el botón al cargar la página
    function hideDropdown() {
      const dropdown = document.getElementById('dropdown');
      dropdown.classList.remove('visible');
    }

    // Mostrar el botón al pasar el ratón o tocar la pantalla
    function showDropdown() {
      const dropdown = document.getElementById('dropdown');
      dropdown.classList.add('visible');
    }

    // Alternar la visibilidad de los submenús
    function toggleSubmenu(idToShow, idsToHide) {
      // Ocultar los submenús anteriores
      idsToHide.forEach(id => {
        const submenuToHide = document.getElementById(id);
        if (submenuToHide) {
          submenuToHide.style.display = 'none';
        }
        // Quitar el resaltado de los botones anteriores
        const buttonToHide = document.getElementById(`${id}-button`);
        if (buttonToHide) {
          buttonToHide.classList.remove('selected');
        }
      });

      // Mostrar u ocultar el submenú actual
      const submenuToShow = document.getElementById(idToShow);
      submenuToShow.style.display = submenuToShow.style.display === 'block' ? 'none' : 'block';

      // Resaltar el botón seleccionado
      const buttonToShow = document.getElementById(`${idToShow}-button`);
      if (buttonToShow) {
        buttonToShow.classList.toggle('selected', submenuToShow.style.display === 'block');
      }
    }

    // Eventos para mostrar/ocultar el botón
    document.addEventListener('mousemove', showDropdown);
    document.addEventListener('touchstart', showDropdown);

    // Cargar LA1 por defecto
    window.onload = function() {
      loadVideo('LA1'); // Cargará La 1 al iniciar
    };
  </script>
