<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directo | Jimgsey</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .video-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .dropdown {
      position: fixed;
      bottom: 50px; /* Subir un poco el botón */
      z-index: 1000;
      background-color: rgba(0, 0, 0, 0.8);
      border-radius: 10px;
      padding: 10px;
      opacity: 1; /* Siempre visible */
    }

    .dropbtn {
      background-color: #006F62;
      color: white;
      padding: 10px 20px;
      border: 2px solid white;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    .dropbtn:hover {
      background-color: #005f56;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: #333;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 1;
      border-radius: 5px;
      overflow: hidden;
    }

    .dropdown-content button {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      background-color: #444;
      border: none;
      width: 100%;
      text-align: left;
      cursor: pointer;
    }

    .dropdown-content button:hover {
      background-color: #555;
    }

    .dropdown:hover .dropdown-content {
      display: block;
    }

    .submenu {
      display: none;
      background-color: #222;
      padding: 5px;
      margin-top: 5px;
      border-radius: 5px;
      max-height: 200px; /* Altura máxima con scroll */
      overflow-y: auto; /* Scroll vertical */
    }

    .submenu button {
      padding: 10px 16px;
      text-align: left;
      width: 100%;
      background-color: #333;
      border: none;
      color: white;
      cursor: pointer;
    }

    .submenu button:hover {
      background-color: #444;
    }

    /* Estilo para resaltar el menú seleccionado */
    .selected {
      background-color: rgba(0, 96, 86, 0.8) !important; /* Verde oscuro semitransparente */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="video-container">
      <iframe id="videoFrame" src="" allow="encrypted-media; picture-in-picture" allowfullscreen></iframe>
    </div>

    <div class="dropdown" id="dropdown">
      <button class="dropbtn" onclick="toggleMenu()">Seleccionar Canal</button>
      <div class="dropdown-content" id="dropdownContent">
        <!-- Menú de TV -->
        <button onclick="toggleSubmenu('tv', ['deportes', 'otros'])" id="tv-button">TV ▼</button>
        <div id="tv" class="submenu">

          <button onclick="selectChannel('LA2')">La 2</button>
          <button onclick="selectChannel('ANTENA3')">Antena 3</button>
          <button onclick="selectChannel('CUATRO')">La Cuatro</button>

          <button onclick="selectChannel('LASEXTA')">La Sexta</button>
          <button onclick="selectChannel('MEGA')">Mega</button>

          <button onclick="selectChannel('FDF')">FDF</button>
          <button onclick="selectChannel('AMC_BREAK')">AMC Break</button>
          <button onclick="selectChannel('DARK')">Dark</button>
          <button onclick="selectChannel('D_KISS')">DKiss</button>
          <button onclick="selectChannel('ODISEA')">Odisea</button>
        </div>

        <!-- Menú de Deportes -->
        <button onclick="toggleSubmenu('deportes', ['tv', 'otros'])" id="deportes-button">Deportes ▼</button>
        <div id="deportes" class="submenu">
          <!-- Submenú DAZN -->
          <button onclick="toggleSubmenu('dazn', ['movistar'])" id="dazn-button">DAZN ▼</button>
          <div id="dazn" class="submenu">
            <button onclick="selectSportsChannel('dazn-formula-1-es/embed.php')">DAZN F1</button>
            <button onclick="selectSportsChannel('dazn-1-es/embed.php')">DAZN 1</button>
            <button onclick="selectSportsChannel('dazn-2-es/embed.php')">DAZN 2</button>
            <button onclick="selectSportsChannel('dazn-4-es/embed2.php')">DAZN 4</button>
            <button onclick="selectSportsChannel('dazn-laliga/embed.php')">DAZN LaLiga</button>
          </div>

          <!-- Submenú Movistar -->
          <button onclick="toggleSubmenu('movistar', ['dazn'])" id="movistar-button">Movistar ▼</button>
          <div id="movistar" class="submenu">
            <button onclick="selectSportsChannel('m-deportes-2/embed2.php')">Movistar D. 2</button>
            <button onclick="selectSportsChannel('m-deportes-3/embed2.php')">Movistar D. 3</button>
            <button onclick="selectSportsChannel('m-deportes-4/embed2.php')">Movistar D. 4</button>
            <button onclick="selectSportsChannel('laliga/embed2.php')">Movistar LaLiga</button>
            <button onclick="selectSportsChannel('m-campeones/embed2.php')">Movistar Campeones</button>
          </div>
        </div>

        <!-- Menú de Otros -->
        <button onclick="toggleSubmenu('otros', ['tv', 'deportes'])" id="otros-button">Otros ▼</button>
        <div id="otros" class="submenu">
          <button onclick="selectOtherChannel('daznf1')">DAZN F1</button>
          <button onclick="selectOtherChannel('dazn')">DAZN</button>
          <button onclick="selectOtherChannel('daznlaliga')">DAZN LaLiga</button>

          <button onclick="selectOtherChannel('premiere')">Premiere</button>
          <button onclick="selectOtherChannel('espn')">ESPN</button>
          <button onclick="selectOtherChannel('espnplus')">ESPN+</button>
          <button onclick="selectOtherChannel('espnpremium')">ESPN Premium</button>
          <button onclick="selectOtherChannel('espndeportes')">ESPN Deportes</button>

          <button onclick="selectOtherChannel('sportv')">Sportv</button>
          <button onclick="selectOtherChannel('dsports')">DSports</button>
          <button onclick="selectOtherChannel('nba')">NBA</button>
          <button onclick="selectOtherChannel('nfl1')">NFL 1</button>
          <button onclick="selectOtherChannel('disney')">Disney</button>
          <button onclick="selectOtherChannel('max')">Max</button>
          <button onclick="selectOtherChannel('deportestvc')">Deportes TVC</button>

          <button onclick="selectOtherChannel('winsports')">Win Sports</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const baseUrlTV = 'https://nebunexa.co/clappr/?id=';
    const baseUrlSports = 'https://deporte-libre.fans/en-vivo-online/';
    const otherBaseUrl = 'https://corsmirror.com/v1?url=https://streamdz1.xyz/player/embed2.php?channel=';

    // Cargar un canal de TV
    function selectChannel(path) {
      const videoFrame = document.getElementById('videoFrame');
      videoFrame.src = baseUrlTV + path;
      closeMenu(); // Cerrar el menú al seleccionar un canal
    }

    // Cargar un canal de Deportes
    function selectSportsChannel(path) {
      const videoFrame = document.getElementById('videoFrame');
      videoFrame.src = baseUrlSports + path;
      closeMenu(); // Cerrar el menú al seleccionar un canal
    }

    // Cargar un canal de "Otros"
    function selectOtherChannel(channel) {
      const videoFrame = document.getElementById('videoFrame');
      videoFrame.src = otherBaseUrl + channel;
      closeMenu(); // Cerrar el menú al seleccionar un canal
    }

    // Cerrar el menú
    function closeMenu() {
      const dropdownContent = document.getElementById('dropdownContent');
      dropdownContent.style.display = 'none'; // Ocultar el menú
    }

    // Alternar la visibilidad del menú principal
    function toggleMenu() {
      const dropdownContent = document.getElementById('dropdownContent');
      dropdownContent.style.display = dropdownContent.style.display === 'block' ? 'none' : 'block';
    }

    // Alternar la visibilidad de los submenús
    function toggleSubmenu(idToShow, idsToHide) {
      // Ocultar los submenús anteriores
      idsToHide.forEach(id => {
        const submenuToHide = document.getElementById(id);
        if (submenuToHide) {
          submenuToHide.style.display = 'none';
        }
        // Quitar el resaltado de los botones anteriores
        const buttonToHide = document.getElementById(`${id}-button`);
        if (buttonToHide) {
          buttonToHide.classList.remove('selected');
        }
      });

      // Mostrar u ocultar el submenú actual
      const submenuToShow = document.getElementById(idToShow);
      submenuToShow.style.display = submenuToShow.style.display === 'block' ? 'none' : 'block';

      // Resaltar el botón seleccionado
      const buttonToShow = document.getElementById(`${idToShow}-button`);
      if (buttonToShow) {
        buttonToShow.classList.toggle('selected', submenuToShow.style.display === 'block');
      }
    }

    // Cargar LA1 por defecto
    window.onload = function() {
      selectChannel('LA1'); // Cargará La 1 al iniciar
    };
  </script>
</body>
</html>
