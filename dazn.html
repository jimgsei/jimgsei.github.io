<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Fullscreen</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe src="https://embed.sdfgnksbounce.com/embed2/daznf1.html" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const iframe = document.querySelector('iframe');
            iframe.addEventListener('load', function() {
                const iframeWindow = iframe.contentWindow;
                const video = iframeWindow.document.querySelector('video');
                if (video) {
                    video.muted = false;
                    video.play();
                }
            });
        });
    </script>
</body>
</html>
