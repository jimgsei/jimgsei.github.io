<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimgsey</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
      overflow: hidden;
    }
    .contenedor {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      animation: fadeIn 2s ease-in-out;
      z-index: 1;
    }
    .botones {
      margin: 20px 0;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }
    .boton {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      background-color: rgba(0, 0, 0, 0.7);
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    .boton:hover {
      background-color: rgba(50, 50, 50, 0.7);
    }
    .dropdown {
      display: none;
      position: absolute;
      background-color: rgba(0, 0, 0, 0.7);
      box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
      z-index: 1;
      border-radius: 5px;
    }
    .dropdown a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
      border-radius: 5px;
    }
    .dropdown a:hover {
      background-color: rgba(50, 50, 50, 0.7);
    }
    .creditos {
      margin-top: 20px;
    }
    .creditos img {
      width: 30px;
      vertical-align: middle;
      filter: invert(1);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
    }
  </style>
</head>
<link rel="icon" href="UP.ico" type="image/x-icon">
<body>
  <div id="particles-js"></div>
  <div class="contenedor">
    <h1>TV - F1 - Caza - Fútbol</h1>
    <div class="botones">
      <div class="dropdown-container">
        <a href="#" class="boton" id="dazn-f1-button">Dazn F1</a>
        <div class="dropdown" id="dazn-f1-dropdown">
          <a href="F1.html">Dazn + Web Datos</a>
          <a href="https://dazcfutboltv.com/">F1 Externo</a>
          <a href="https://rr.dazcfutbolios.xyz/">F1 Iphone</a>
          <a href="https://vk.com/video/@f1paratodos">F1 Subidos</a>
        </div>
      </div>
      <div class="dropdown-container">
        <a href="#" class="boton" id="f1tv-button">F1 TV</a>
        <div class="dropdown" id="f1tv-dropdown">
          <a href="daz.html">Opción 1</a>
          <a href="dazn.html">Opción 2</a>
        </div>
      </div>
      <div class="dropdown-container">
        <a href="#" class="boton" id="liga-button">La Liga</a>
        <div class="dropdown" id="liga-dropdown">
          <a href="LIGA.html">La Liga</a>
          <a href="https://dazcfutboltv.com/">La Liga Externo</a>
          <a href="https://rr.dazcfutbolios.xyz/">La Liga Iphone</a>
          <a href="https://en.gdplayertv.to/live-tv/dazn-laliga/?embed=1">Liga TV</a>
        </div>
      </div>
      <!-- Botón Caza y Pesca -->
      <div class="dropdown-container">
        <a href="#" class="boton" id="caza-button">Caza y Pesca</a>
        <div class="dropdown" id="caza-dropdown">
          <a href="CAZA.html">Caza 1</a>
          <a href="caza.html">Caza 2</a>
        </div>
      </div>
      <!-- Botón TV -->
      <div class="dropdown-container">
        <a href="#" class="boton" id="tv-button">TV</a>
        <div class="dropdown" id="tv-dropdown">
          <a href="https://oha.to/">Opción 1</a>
          <a href="https://huhu.to/">Opción 2</a>
          <a href="https://vavoo.to/">Opción 3</a>
		  <a href="https://kool.to">Opción 4</a>
        </div>
      </div>
    </div>
    <div class="creditos">
      <span>Creado por Jimgsey</span>
      <a href="https://github.com/jimgsey" target="_blank">
        <img src="https://img.icons8.com/ios/50/000000/github.png" alt="Github">
      </a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    function closeAllDropdowns() {
      var dropdowns = document.getElementsByClassName('dropdown');
      for (var i = 0; i < dropdowns.length; i++) {
        dropdowns[i].style.display = 'none';
      }
    }

    document.getElementById('dazn-f1-button').addEventListener('click', function(event) {
      event.preventDefault();
      closeAllDropdowns();
      var dropdown = document.getElementById('dazn-f1-dropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });

    document.getElementById('f1tv-button').addEventListener('click', function(event) {
      event.preventDefault();
      closeAllDropdowns();
      var dropdown = document.getElementById('f1tv-dropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });

    document.getElementById('liga-button').addEventListener('click', function(event) {
      event.preventDefault();
      closeAllDropdowns();
      var dropdown = document.getElementById('liga-dropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });

    document.getElementById('caza-button').addEventListener('click', function(event) {
      event.preventDefault();
      closeAllDropdowns();
      var dropdown = document.getElementById('caza-dropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });

    document.getElementById('tv-button').addEventListener('click', function(event) {
      event.preventDefault();
      closeAllDropdowns();
      var dropdown = document.getElementById('tv-dropdown');
      dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    });

    window.onclick = function(event) {
      if (!event.target.matches('.boton')) {
        closeAllDropdowns();
      }
    }
  </script>
    <script>
    particlesJS("particles-js", {
      "particles": {
        "number": {
          "value": 100,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#ffffff"
        },
        "shape": {
          "type": "circle",
          "stroke": {
            "width": 0,
            "color": "#000000"
          },
          "polygon": {
            "nb_sides": 5
          },
          "image": {
            "src": "img/github.svg",
            "width": 100,
            "height": 100
          }
        },
        "opacity": {
          "value": 0.5,
          "random": false,
          "anim": {
            "enable": false,
            "speed": 1,
            "opacity_min": 0.1,
            "sync": false
          }
        },
        "size": {
          "value": 3,
          "random": true,
          "anim": {
            "enable": false,
            "speed": 40,
            "size_min": 0.1,
            "sync": false
          }
        },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 6,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
          "attract": {
            "enable": false,
            "rotateX": 600,
            "rotateY": 1200
          }
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": true,
            "mode": "grab"
          },
          "onclick": {
            "enable": true,
            "mode": "push"
          },
          "resize": true
        },
        "modes": {
          "grab": {
            "distance": 140,
            "line_linked": {
              "opacity": 1
            }
          },
          "bubble": {
            "distance": 400,
            "size": 40,
            "duration": 2,
            "opacity": 8,
            "speed": 3
          },
          "repulse": {
            "distance": 200,
            "duration": 0.4
          },
          "push": {
            "particles_nb": 4
          },
          "remove": {
            "particles_nb": 2
          }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
