<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimgsey</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: white;
      overflow: hidden;
    }
    .contenedor {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
      animation: fadeIn 2s ease-in-out;
      z-index: 1;
    }
    .botones {
      margin: 20px 0;
    }
    .boton {
      display: inline-block;
      margin: 10px;
      padding: 10px 20px;
      text-decoration: none;
      color: white;
      background-color: rgba(0, 0, 0, 0.7);
      border-radius: 5px;
      transition: background-color 0.3s;
    }
    .boton:hover {
      background-color: rgba(50, 50, 50, 0.7);
    }
    .creditos {
      margin-top: 20px;
    }
    .creditos img {
      width: 30px;
      vertical-align: middle;
      filter: invert(1);
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    #particles-js {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 0;
    }
  </style>
</head>
   <link rel="icon" href="UP.ico" type="image/x-icon">
<body>
  <div id="particles-js"></div>
  <div class="contenedor">
    <h1>F1 / La Liga</h1>
    <div class="botones">
      <a href="F1.html" class="boton">F1 Dazn</a>
      <a href="https://vk.com/video/@f1paratodos" class="boton">F1 Subidos</a> 
      <a href="https://dazcfutboltv.com/" class="boton">Liga + F1</a>
      <a href="https://rr.dazcfutbolios.xyz/" class="boton">Liga + F1 Iphone</a>
      <a href="https://en.gdplayertv.to/live-tv/dazn-laliga/?embed=1" class="boton">Dazn LaLiga</a>
      <a href="https://deporte-libre.top/en-vivo-online/dazn-formula-1-es/embed2.php" class="boton">F1a</a>
      
      
    </div>
    <div class="creditos">
      <span>Creado por Jimgsey</span>
      <a href="https://github.com/jimgsey" target="_blank">
        <img src="https://img.icons8.com/ios/50/000000/github.png" alt="Github">
      </a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": {
          "value": 100,
          "density": {
            "enable": true,
            "value_area": 800
          }
        },
        "color": {
          "value": "#ffffff"
        },
        "shape": {
          "type": "circle",
          "stroke": {
            "width": 0,
            "color": "#000000"
          },
          "polygon": {
            "nb_sides": 5
          },
          "image": {
            "src": "img/github.svg",
            "width": 100,
            "height": 100
          }
        },
        "opacity": {
          "value": 0.5,
          "random": false,
          "anim": {
            "enable": false,
            "speed": 1,
            "opacity_min": 0.1,
            "sync": false
          }
        },
        "size": {
          "value": 3,
          "random": true,
          "anim": {
            "enable": false,
            "speed": 40,
            "size_min": 0.1,
            "sync": false
          }
        },
        "line_linked": {
          "enable": true,
          "distance": 150,
          "color": "#ffffff",
          "opacity": 0.4,
          "width": 1
        },
        "move": {
          "enable": true,
          "speed": 6,
          "direction": "none",
          "random": false,
          "straight": false,
          "out_mode": "out",
          "bounce": false,
          "attract": {
            "enable": false,
            "rotateX": 600,
            "rotateY": 1200
          }
        }
      },
      "interactivity": {
        "detect_on": "canvas",
        "events": {
          "onhover": {
            "enable": true,
            "mode": "grab"
          },
          "onclick": {
            "enable": true,
            "mode": "push"
          },
          "resize": true
        },
        "modes": {
          "grab": {
            "distance": 140,
            "line_linked": {
              "opacity": 1
            }
          },
          "bubble": {
            "distance": 400,
            "size": 40,
            "duration": 2,
            "opacity": 8,
            "speed": 3
          },
          "repulse": {
            "distance": 200,
            "duration": 0.4
          },
          "push": {
            "particles_nb": 4
          },
          "remove": {
            "particles_nb": 2
          }
        }
      },
      "retina_detect": true
    });
  </script>
</body>
</html>
