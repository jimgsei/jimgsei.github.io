<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Selector</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 40px;
        }
        .video-container {
            margin-bottom: 30px;
            width: 45%;
            background-color: #222;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px #444;
            display: inline-block;
            vertical-align: top;
        }
        .player-menu {
            margin-bottom: 20px;
        }
        select {
            margin: 5px;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            background-color: #333;
            color: white;
            border: 1px solid #444;
        }
        button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 8px;
        }

        /* Media Query for Small Screens (Mobile) */
        @media (max-width: 768px) {
            .video-container {
                width: 100%; /* Full width on small screens */
            }
        }

        /* Media Query for Larger Screens (Desktop) */
        @media (min-width: 769px) {
            .video-container {
                width: 45%; /* Two columns on large screens */
            }
        }
    </style>
    <script>
        const specialChannels = ["sportv3"]; // Special channels to disable the number dropdown

        function updatePlayer(playerId) {
            const category = document.getElementById(`category-${playerId}`).value;
            const number = document.getElementById(`number-${playerId}`);
            const iframe = document.getElementById(`iframe-${playerId}`);

            // Check if the selected channel is in the special list
            if (specialChannels.includes(category)) {
                number.disabled = true;  // Disable the number selector for special channels
            } else {
                number.disabled = false; // Enable the number selector for other channels
            }

            // Update the iframe src based on category selection
            if (category === "daznf1 24h") {
                iframe.src = "https://embed.sdfgnksbounce.com/embed2/daznf1.html"; // Updated URL
            } else {
                const numberValue = number.disabled ? '' : number.value;
                iframe.src = `https://wris.asia/player/embed.php?channel=${category}${numberValue}`;
            }
        }
    </script>
</head>
<body>
    <h1>Video Selector Interface</h1>
    <div id="players">
        <!-- Repeat video player structure dynamically -->
    </div>

    <script>
        const channels = [
            "daznlaliga_", "dazn1_", "dazn2_", "dazn3_", "dazn4_", "daznf1_", "daznf1 24h", "espnplus", "sportv", 
            "mplus_", "disney", "max", "nba"
        ];

        const createPlayer = (id) => {
            return `
                <div class="video-container">
                    <div class="player-menu">
                        <select id="category-${id}" onchange="updatePlayer(${id})">
                            ${channels.map(channel => `<option value="${channel}">${channel}</option>`).join('')}
                        </select>
                        <select id="number-${id}" onchange="updatePlayer(${id})">
                            ${[...Array(15).keys()].map(i => `<option value="${i + 1}">${i + 1}</option>`).join('')}
                        </select>
                    </div>
                    <iframe id="iframe-${id}" src="about:blank"></iframe>
                </div>
            `;
        };

        const playerContainer = document.getElementById('players');
        for (let i = 1; i <= 4; i++) {
            playerContainer.innerHTML += createPlayer(i);
        }
    </script>
</body>
</html>
