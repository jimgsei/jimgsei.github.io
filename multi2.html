<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Selector</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 {
            margin-bottom: 40px;
        }
        .video-container {
            margin-bottom: 30px;
            width: 45%;
            background-color: #222;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px #444;
            display: inline-block;
            vertical-align: top;
        }
        .player-menu {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .player-menu select {
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            background-color: #333;
            color: white;
            border: 1px solid #444;
        }
        .player-menu button {
            padding: 10px 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .player-menu button:hover {
            background-color: #0056b3;
        }
        iframe {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 8px;
        }

        /* Media Query for Small Screens (Mobile) */
        @media (max-width: 768px) {
            .video-container {
                width: 100%; /* Full width on small screens */
            }
        }

        /* Media Query for Larger Screens (Desktop) */
        @media (min-width: 769px) {
            .video-container {
                width: 45%; /* Two columns on large screens */
            }
        }
    </style>
    <script>
        const specialChannels = ["sportv3", "daznf1 24h"]; // Special channels to disable the number dropdown
        const channelUrls = {
            "daznf1 24h": "https://embed.sdfgnksbounce.com/embed2/daznf1.html", // Custom URL for "daznf1 24h"
            "daznf1_": "https://antuanct78.github.io/-016-ES-DAZN-F1/", // Custom URL for "daznf1_"
            // Add other custom URLs for specific channels here if needed
        };

        // Define the base URL for TDT channels
        const tdtBaseUrl = "https://nebunexa.co/clappr/?id=";
        const tdtChannels = ["LA1", "ANTENA3", "CUATRO", "TELECINCO", "LASEXTA"];

        function updatePlayer(playerId) {
            const category = document.getElementById(`category-${playerId}`).value;
            const number = document.getElementById(`number-${playerId}`);
            const iframe = document.getElementById(`iframe-${playerId}`);

            // Check if the selected channel is in the special list
            if (specialChannels.includes(category)) {
                number.disabled = true;  // Disable the number selector for special channels
            } else {
                number.disabled = false; // Enable the number selector for other channels
            }

            // Check if the category is TDT
            if (category === "TDT") {
                const tdtChannel = document.getElementById(`tdt-channel-${playerId}`).value;
                iframe.src = `${tdtBaseUrl}${tdtChannel}`;
                number.disabled = true; // Disable the number selector when TDT is selected
                document.getElementById(`number-${playerId}`).style.display = "none"; // Hide the number dropdown
            } else {
                document.getElementById(`number-${playerId}`).style.display = "inline-block"; // Show the number dropdown
                const numberValue = number.disabled ? '' : number.value;
                iframe.src = `https://wris.asia/player/embed.php?channel=${category}${numberValue}`;
            }
        }

        // Function to reload the iframe when the 'Actualizar' button is clicked
        function reloadIframe(playerId) {
            updatePlayer(playerId);
        }
    </script>
</head>
<body>
    <h1>Video Selector Interface</h1>

    <div id="players">
        <!-- Repeat video player structure dynamically -->
    </div>

    <script>
        const channels = [
            "daznlaliga_", "dazn1_", "dazn2_", "dazn3_", "dazn4_", "daznf1_", "daznf1 24h", "espnplus", "sportv", 
            "mplus_", "disney", "max", "nba", "TDT"
        ];

        const createPlayer = (id) => {
            return `
                <div class="video-container">
                    <div class="player-menu">
                        <select id="category-${id}" onchange="updatePlayer(${id})">
                            ${channels.map(channel => `<option value="${channel}">${channel}</option>`).join('')}
                        </select>
                        <select id="number-${id}" onchange="updatePlayer(${id})">
                            ${[...Array(15).keys()].map(i => `<option value="${i + 1}">${i + 1}</option>`).join('')}
                        </select>
                        <!-- TDT-specific channel selector -->
                        <select id="tdt-channel-${id}" onchange="updatePlayer(${id})" style="display:none;">
                            ${tdtChannels.map(channel => `<option value="${channel}">${channel}</option>`).join('')}
                        </select>
                        <button onclick="reloadIframe(${id})">Actualizar</button>
                    </div>
                    <iframe id="iframe-${id}" src="about:blank"></iframe>
                </div>
            `;
        };

        const playerContainer = document.getElementById('players');
        for (let i = 1; i <= 4; i++) {
            playerContainer.innerHTML += createPlayer(i);
        }

        // Show the TDT channel selector only if TDT is selected
        document.querySelectorAll('select[id^="category-"]').forEach(select => {
            select.addEventListener('change', (event) => {
                const id = event.target.id.split('-')[1];
                const tdtChannelSelect = document.getElementById(`tdt-channel-${id}`);
                const numberSelect = document.getElementById(`number-${id}`);
                if (event.target.value === "TDT") {
                    tdtChannelSelect.style.display = "inline-block"; // Show TDT channels selector
                    numberSelect.style.display = "none"; // Hide number selector
                } else {
                    tdtChannelSelect.style.display = "none"; // Hide TDT channels selector
                    numberSelect.style.display = "inline-block"; // Show number selector
                }
            });
        });
    </script>
</body>
</html>
