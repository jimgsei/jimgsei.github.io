<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Canales</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: black;
            color: white;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            padding: 10px;
        }
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 5px;
        }
        .controls select, .controls button {
            font-size: 16px;
            padding: 5px;
        }
        .controls button {
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 3px;
        }
        .controls button:hover {
            background-color: #0056b3;
        }
        @media (min-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Contenedor de los videos -->
        <div class="video-container">
            <iframe id="iframe1" src="https://wris.asia/player/embed.php?channel=disney12"></iframe>
            <div class="controls">
                <select id="video1">
                    <!-- Generar opciones de manera automática -->
                </select>
                <button onclick="updateVideo(1)">Seleccionar Canal</button>
            </div>
        </div>
        <div class="video-container">
            <iframe id="iframe2" src="https://wris.asia/player/embed.php?channel=disney13"></iframe>
            <div class="controls">
                <select id="video2">
                    <!-- Generar opciones de manera automática -->
                </select>
                <button onclick="updateVideo(2)">Seleccionar Canal</button>
            </div>
        </div>
        <div class="video-container">
            <iframe id="iframe3" src="https://wris.asia/player/embed.php?channel=disney14"></iframe>
            <div class="controls">
                <select id="video3">
                    <!-- Generar opciones de manera automática -->
                </select>
                <button onclick="updateVideo(3)">Seleccionar Canal</button>
            </div>
        </div>
        <div class="video-container">
            <iframe id="iframe4" src="https://wris.asia/player/embed.php?channel=disney15"></iframe>
            <div class="controls">
                <select id="video4">
                    <!-- Generar opciones de manera automática -->
                </select>
                <button onclick="updateVideo(4)">Seleccionar Canal</button>
            </div>
        </div>
    </div>

    <script>
        // Lista fija de canales disponibles
        const channels = [
            { number: 1, name: "Canal 1" },
            { number: 2, name: "Canal 2" },
            { number: 3, name: "Canal 3" },
            { number: 4, name: "Canal 4" },
            { number: 5, name: "Canal 5" },
            { number: 6, name: "Canal 6" },
            { number: 7, name: "Canal 7" },
            { number: 8, name: "Canal 8" },
            { number: 9, name: "Canal 9" },
            { number: 10, name: "Canal 10" },
            { number: 11, name: "Canal 11" },
            { number: 12, name: "Canal 12" },
            { number: 13, name: "Canal 13" },
            { number: 14, name: "Canal 14" },
            { number: 15, name: "Canal 15" },
            { number: 16, name: "Canal 16" },
            { number: 17, name: "Canal 17" },
            { number: 18, name: "Canal 18" },
            { number: 19, name: "Canal 19" },
            { number: 20, name: "Canal 20" },
            { number: 21, name: "Canal 21" },
            { number: 22, name: "Canal 22" },
            { number: 23, name: "Canal 23" },
            { number: 24, name: "Canal 24" },
            { number: 25, name: "Canal 25" }
        ];

        // Generar las opciones de canal dinámicamente
        function populateChannelOptions() {
            for (let i = 1; i <= 4; i++) {
                const select = document.getElementById(`video${i}`);
                channels.forEach(channel => {
                    const option = document.createElement("option");
                    option.value = channel.number;
                    option.textContent = channel.name;
                    select.appendChild(option);
                });
            }
        }

        // Cambiar el canal de un video específico
        function updateVideo(videoNumber) {
            const channel = document.getElementById(`video${videoNumber}`).value;
            const iframe = document.getElementById(`iframe${videoNumber}`);
            iframe.src = `https://wris.asia/player/embed.php?channel=disney${channel}`;
        }

        // Llamar a la función para inicializar las opciones
        populateChannelOptions();
    </script>
</body>
</html>
