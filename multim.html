<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor de Deportes Universal</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin-top: 40px;
            margin-bottom: 40px;
        }

        .video-container {
            margin-bottom: 30px;
            background-color: #222;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0px 0px 10px #444;
            display: inline-block;
            vertical-align: top;
            width: 90%;
        }

        .player-menu {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .player-menu select, .player-menu button {
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            background-color: #333;
            color: white;
            border: 1px solid #444;
            min-width: 100px;
            max-width: 150px;
        }

        .player-menu button {
            background-color: #007BFF;
            cursor: pointer;
        }

        .player-menu button:hover {
            background-color: #0056b3;
        }

        iframe, video {
            width: 100%;
            height: 400px;
            border: none;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        #current-deportes-url {
            margin-top: 10px;
            color: lightgray;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h1>Reproductor de Deportes Universal</h1>

    <div class="video-container">
        <div class="player-menu">
            <select id="deportes-channel-select" onchange="updateDeportesIframe()">
                <option value="">Selec. Canal</option>
            </select>
            <select id="espn-number-select" onchange="updateDeportesIframe()" style="display: none;">
                <option value="">Más canales</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
            </select>
            <select id="deportes-option-select" onchange="updateDeportesIframeWithOption()" style="display:none;">
                <option value="">Op. Visual</option>
                <option value="_1">_1</option>
                <option value="_2">_2</option>
                <option value="_3">_3</option>
                <option value="_4">_4</option>
            </select>
            <button onclick="reloadDeportesIframe()">Actualizar</button>
        </div>

        <!-- Reproductor HTML5 -->
        <video id="html5-player" controls style="display: none;"></video>

        <!-- Reproductor HLS -->
        <video id="hls-player" controls style="display: none;"></video>

        <!-- Reproductor DASH -->
        <video id="dash-player" controls style="display: none;"></video>

        <!-- Reproductor YouTube -->
        <iframe id="youtube-player" src="about:blank" allowfullscreen style="display: none;"></iframe>

        <!-- Reproductor Vimeo -->
        <iframe id="vimeo-player" src="about:blank" allowfullscreen style="display: none;"></iframe>

        <!-- Reproductor original (iframe) -->
        <iframe id="iframe-deportes" src="about:blank" allowfullscreen allow="fullscreen; picture-in-picture"></iframe>

        <div id="iframe-deportes-url">
            <span id="current-deportes-url"></span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <script>
        let channelsData;

        async function loadCanalJson() {
            const response = await fetch('https://raw.githubusercontent.com/jimgsei/jimgsei.github.io/refs/heads/master/canal.json');
            const data = await response.json();
            return data;
        }

        function updateDeportesIframeWithOption() {
            const selectedChannel = document.getElementById('deportes-channel-select').value;
            const selectedOption = document.getElementById('deportes-option-select').value;
            const selectedNumber = document.getElementById('espn-number-select').value;
            const iframe = document.getElementById('iframe-deportes');
            const urlDisplay = document.getElementById('current-deportes-url');

            let newUrl = "";

            if (channelsData.channelUrls[selectedChannel]) {
                newUrl = channelsData.channelUrls[selectedChannel];
            } else if (channelsData.sportUrl) {
                newUrl = `${channelsData.sportUrl}${selectedChannel}`;
            }

            if (['eventos', 'espnplus', 'paramount', 'dazn', 'sportv', 'nba', 'max'].includes(selectedChannel)) {
                if (selectedNumber && selectedNumber !== "") {
                    newUrl = newUrl.replace(/\d+$/, "");
                    newUrl += selectedNumber;
                } else {
                    newUrl = newUrl.replace(/\d+$/, "");
                    newUrl += "1";
                }
            } else if (['espn', 'foxar', 'foxmx', 'deportestvc', 'hypermotion', 'premiere', 'mlaliga', 'mcampeones', 'disney', 'tigopy', 'espnmx', 'fanatiz'].includes(selectedChannel) && selectedNumber && selectedNumber !== "") {
                newUrl += selectedNumber;
            }

            if (selectedOption && selectedOption !== "") {
                newUrl += selectedOption;
            }

            if (newUrl) {
                iframe.src = newUrl;
                urlDisplay.textContent = newUrl;

                // Actualizar todos los reproductores
                updateAllPlayers(newUrl);
            }
        }

        function updateDeportesIframe() {
            const selectedChannel = document.getElementById('deportes-channel-select').value;
            const selectedNumber = document.getElementById('espn-number-select').value;
            const iframe = document.getElementById('iframe-deportes');
            const urlDisplay = document.getElementById('current-deportes-url');

            let newUrl = "";

            if (channelsData.channelUrls[selectedChannel]) {
                newUrl = channelsData.channelUrls[selectedChannel];
            } else if (channelsData.sportUrl) {
                newUrl = `${channelsData.sportUrl}${selectedChannel}`;
            }

            if (['eventos', 'espnplus', 'paramount', 'dazn', 'sportv', 'nba', 'max'].includes(selectedChannel)) {
                if (selectedNumber && selectedNumber !== "") {
                    newUrl = newUrl.replace(/\d+$/, "");
                    newUrl += selectedNumber;
                } else {
                    newUrl = newUrl.replace(/\d+$/, "");
                    newUrl += "1";
                }
            } else if (['espn', 'foxar', 'foxmx', 'deportestvc', 'hypermotion', 'premiere', 'mlaliga', 'mcampeones', 'disney', 'tigopy', 'espnmx', 'fanatiz'].includes(selectedChannel) && selectedNumber && selectedNumber !== "") {
                newUrl += selectedNumber;
            }

            if (newUrl) {
                iframe.src = newUrl;
                urlDisplay.textContent = newUrl;

                // Actualizar todos los reproductores
                updateAllPlayers(newUrl);
            }
        }

        function updateAllPlayers(url) {
            const html5Player = document.getElementById('html5-player');
            const hlsPlayer = document.getElementById('hls-player');
            const dashPlayer = document.getElementById('dash-player');
            const youtubePlayer = document.getElementById('youtube-player');
            const vimeoPlayer = document.getElementById('vimeo-player');

            // HTML5
            html5Player.src = url;
            html5Player.style.display = 'block';

            // HLS
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(hlsPlayer);
                hlsPlayer.style.display = 'block';
            } else if (hlsPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                hlsPlayer.src = url;
                hlsPlayer.style.display = 'block';
            }

            // DASH
            const dash = dashjs.MediaPlayer().create();
            dash.initialize(dashPlayer, url, true);
            dashPlayer.style.display = 'block';

            // YouTube y Vimeo (solo si la URL es válida)
            if (url.includes('youtube.com')) {
                youtubePlayer.src = `https://www.youtube.com/embed/${url.split('v=')[1]}`;
                youtubePlayer.style.display = 'block';
            } else if (url.includes('vimeo.com')) {
                vimeoPlayer.src = `https://player.vimeo.com/video/${url.split('vimeo.com/')[1]}`;
                vimeoPlayer.style.display = 'block';
            }
        }

        function reloadDeportesIframe() {
            updateDeportesIframe();
        }

        loadCanalJson().then(data => {
            channelsData = data;
            const deportesSelect = document.getElementById('deportes-channel-select');

            channelsData.specialChannels.forEach(channel => {
                const option = document.createElement('option');
                option.value = channel;
                option.textContent = channel;
                deportesSelect.appendChild(option);
            });

            deportesSelect.addEventListener('change', updateDeportesIframe);
            document.getElementById('espn-number-select').addEventListener('change', updateDeportesIframe);
            document.getElementById('deportes-option-select').addEventListener('change', updateDeportesIframeWithOption);
        });
    </script>
</body>
</html>
