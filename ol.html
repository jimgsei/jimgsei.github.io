<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor HLS con hls.js</title>
</head>
<body>
    <h1>Reproductor HLS</h1>
    <video id="videoPlayer" controls width="640" height="360"></video>

    <!-- Incluye hls.js desde un CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        var video = document.getElementById('videoPlayer');
        var videoSrc = 'http://mku0414.oknirvana.club:8880/live/29ca10173n08/asdf23r2/2553.m3u8';

        if (Hls.isSupported()) {
            var hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Para Safari o navegadores que soportan HLS nativamente
            video.src = videoSrc;
            video.addEventListener('canplay', function() {
                video.play();
            });
        } else {
            alert('HLS no es soportado por este navegador.');
        }
    </script>
</body>
</html>
