<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor M3U8 con Video.js</title>
    <link href="https://vjs.zencdn.net/7.11.4/video-js.css" rel="stylesheet" />
</head>
<body>
    <h1>Reproductor M3U8 con Video.js</h1>
    <video id="videoPlayer" class="video-js vjs-default-skin" controls preload="auto" width="640" height="360"></video>
    <button id="playButton">Reproducir</button>

    <script src="https://vjs.zencdn.net/7.11.4/video.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-http-streaming@latest/dist/videojs-http-streaming.min.js"></script>
    <script>
        var player = videojs('videoPlayer');
        document.getElementById('playButton').addEventListener('click', function() {
            player.src({
                src: 'http://mku0414.oknirvana.club:8880/live/29ca10173n08/asdf23r2/2553.m3u8',
                type: 'application/x-mpegURL'
            });
            player.play();
        });
    </script>
</body>
</html>
