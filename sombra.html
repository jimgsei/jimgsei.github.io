                const groundPos = getScreenPosFromAzAlt(moonAzimuth, 0, radius);
                const axis = document.createElementNS("http://www.w3.org/2000/svg", "line");
                axis.setAttribute('x1', center.x + screenPos.x);
                axis.setAttribute('y1', center.y + screenPos.y);
                axis.setAttribute('x2', center.x + groundPos.x);
                axis.setAttribute('y2', center.y + groundPos.y);
                axis.setAttribute('stroke', '#87CEEB');
                axis.setAttribute('stroke-width', '1.5');
                axis.setAttribute('stroke-dasharray', '3,2');
                axis.classList.add('axis-line');
                sunPath.querySelector('svg').appendChild(axis);

                const axisGround = document.createElementNS("http://www.w3.org/2000/svg", "line");
                axisGround.setAttribute('x1', center.x);
                axisGround.setAttribute('y1', center.y + DOME_VERTICAL_OFFSET * radius);
                axisGround.setAttribute('x2', center.x + groundPos.x);
                axisGround.setAttribute('y2', center.y + groundPos.y);
                axisGround.setAttribute('stroke', '#87CEEB');
                axisGround.setAttribute('stroke-width', '1');
                axisGround.setAttribute('stroke-opacity', '0.6');
                axisGround.classList.add('axis-line');
                sunPath.querySelector('svg').appendChild(axisGround);
            }

            if (celestialForShadow) {
                const shadowLengthMeters = objectHeightSlider.value / Math.tan(celestialForShadow.altitude);
                const objectWidthPx = objectWidthSlider.value / metersPerPixel;
                const objectHeightPx = objectHeightSlider.value / metersPerPixel;
                const shadowLengthPx = shadowLengthMeters / metersPerPixel;
                
                shadow.style.width = `${objectWidthPx}px`;
                shadow.style.height = `${shadowLengthPx}px`;
                shadow.style.left = '50%';
                shadow.style.top = `calc(50% + ${objectWidthPx/2}px)`;
                shadow.style.transform = `translateX(-50%) rotate(${celestialForShadow.azimuth}deg)`;
                shadow.style.display = 'block';
                
                solarAltitudeDisplay.textContent = `${(celestialForShadow.altitude * 180 / Math.PI).toFixed(1)}°`;
                solarAzimuthDisplay.textContent = `${celestialForShadow.azimuth.toFixed(1)}°`;
                shadowLengthDisplay.textContent = `${shadowLengthMeters.toFixed(1)} m`;

                const ray = document.createElement('div');
                ray.className = activeCelestialDisplay.textContent === 'Luna' ? 'azimuth-ray moon' : 'azimuth-ray';
                const rayLength = Math.max(window.innerWidth, window.innerHeight);
                ray.style.width = `${rayLength}px`;
                ray.style.left = `50%`;
                ray.style.top = `50%`;
                const lightDir = celestialForShadow.azimuth + 180;
                ray.style.transform = `translate(0, -50%) rotate(${lightDir - 90}deg)`;
                shadowOverlay.appendChild(ray);
            } else {
                shadow.style.display = 'none';
                solarAltitudeDisplay.textContent = '-'; 
                solarAzimuthDisplay.textContent = '-'; 
                shadowLengthDisplay.textContent = '-';
                activeCelestialDisplay.textContent = 'Ninguno';
            }

            const times = SunCalc.getTimes(fullDate, lat, lng);
            if (times.sunrise && times.sunset && !isNaN(times.sunrise) && !isNaN(times.sunset)) {
                const durMs = times.sunset - times.sunrise;
                const durH = Math.floor(durMs / 3600000);
                const durM = Math.floor((durMs % 3600000) / 60000);
                dayDurationDisplay.textContent = `${durH}h ${durM}min`;
            } else {
                dayDurationDisplay.textContent = '—';
            }
            if (times.solarNoon && !isNaN(times.solarNoon)) {
                const n = times.solarNoon;
                solarNoonDisplay.textContent = `${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}`;
            } else {
                solarNoonDisplay.textContent = '—';
            }
            const moonIll = SunCalc.getMoonIllumination(fullDate);
            const phaseVal = moonIll.phase;
            let phaseName;
            if (phaseVal < 0.03 || phaseVal > 0.97) phaseName = 'Nueva';
            else if (phaseVal < 0.22) phaseName = 'Creciente';
            else if (phaseVal < 0.28) phaseName = 'Cuarto Creciente';
            else if (phaseVal < 0.47) phaseName = 'Gibosa Creciente';
            else if (phaseVal < 0.53) phaseName = 'Llena';
            else if (phaseVal < 0.72) phaseName = 'Gibosa Menguante';
            else if (phaseVal < 0.78) phaseName = 'Cuarto Menguante';
            else phaseName = 'Menguante';
            moonPhaseTextDisplay.textContent = `${phaseName} · ${Math.round(moonIll.fraction * 100)}%`;
        }

        function updateDisplay(forcePathRedraw = false) {
            updateScale(); 
            updateObjectAppearance();
            const dayOfYear = parseInt(dateSlider.value), date = dayOfYearToDate(dayOfYear), hour = parseFloat(timeSlider.value);
            const hours = Math.floor(hour), minutes = Math.round((hour - hours) * 60);
            currentTimeDisplay.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;
            currentDate.textContent = date.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });
            const center = map.getCenter();
            
            const cacheKey = `${dayOfYear}_${center.lat.toFixed(4)}_${center.lng.toFixed(4)}`;
            if (forcePathRedraw || sunPath.dataset.cacheKey !== cacheKey) {
                 drawPaths(date, center.lat, center.lng);
                 sunPath.dataset.cacheKey = cacheKey;
            }
            updateShadowAndMarkers(date, hour, center.lat, center.lng);
        }

        function stopAnimation() {
            if (isPlaying) {
                cancelAnimationFrame(animationFrameId); 
                animationFrameId = null; 
                isPlaying = false; 
                animationStartTime = null;
                animationBtn.textContent = '▶ Animar 24h';
            }
        }

        function animate(currentTime) {
            if (!isPlaying) return;
            if (!animationStartTime) animationStartTime = currentTime;
            let elapsed = currentTime - animationStartTime;
            if (elapsed >= ANIMATION_DURATION) { elapsed = 0; animationStartTime = currentTime; }
            const progress = elapsed / ANIMATION_DURATION;
            timeSlider.value = parseFloat(timeSlider.min) + (progress * (timeSlider.max - timeSlider.min));
            updateDisplay();
            animationFrameId = requestAnimationFrame(animate);
        }

        function toggleAnimation() { 
            if (isPlaying) { 
                stopAnimation(); 
            } else { 
                isPlaying = true; 
                animationBtn.textContent = '❚❚ Pausa'; 
                animationFrameId = requestAnimationFrame(animate); 
            } 
        }
        
        async function searchLocation() {
            const query = locationSearchInput.value; 
            if (!query) return; 
            stopAnimation();
            const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&email=simulador.sombras@example.com`;
            try {
                const response = await fetch(url, { headers: { 'User-Agent': 'SolarShadowSimulator/1.0' } });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                if (data && data.length > 0) { 
                    map.setView([data[0].lat, data[0].lon], 18); 
                    locationSearchInput.value = ''; 
                }
                else { alert("Ubicación no encontrada."); }
            } catch (error) { 
                console.error("Search error:", error); 
                alert("Error en la búsqueda de ubicación."); 
            }
        }
        
        function getCurrentLocation() { 
            navigator.geolocation.getCurrentPosition( 
                p => map.setView([p.coords.latitude, p.coords.longitude]), 
                e => alert('No se pudo obtener tu ubicación: ' + e.message), 
                { enableHighAccuracy: true } 
            ); 
        }
        
        function toggleMapLock() {
            isMapLocked = !isMapLocked;
            if (isMapLocked) { 
                map.dragging.disable();
                map.touchZoom.disable();
                map.doubleClickZoom.disable();
                map.scrollWheelZoom.disable();
                map.boxZoom.disable();
                map.keyboard.disable();
                if (map.tap) map.tap.disable();
                document.getElementById('map').classList.add('locked'); 
                lockMapBtn.textContent = '🔓 Desbloquear'; 
                lockMapBtn.classList.add('active'); 
            }
            else { 
                map.dragging.enable();
                map.touchZoom.enable();
                map.doubleClickZoom.enable();
                map.scrollWheelZoom.enable();
                map.boxZoom.enable();
                map.keyboard.enable();
                if (map.tap) map.tap.enable();
                document.getElementById('map').classList.remove('locked'); 
                lockMapBtn.textContent = '🔒 Bloquear Mapa'; 
                lockMapBtn.classList.remove('active'); 
            }
        }
        
        function animateCompass() {
            if (!isRealCompassActive && Math.abs(currentHeading - targetHeading) < 0.1) {
                isCompassLoopRunning = false;
                compassInner.style.transform = `rotate(0deg)`;
                sunPathContainer.style.transform = `translate(-50%, -50%) rotate(0deg)`;
                compassNeedle.style.transform = `translate(-50%, -100%) rotate(0deg)`;
                return;
            }

            const diff = targetHeading - currentHeading;
            if (Math.abs(diff) > 180) {
                currentHeading += diff > 0 ? -360 : 360;
            }
            
            currentHeading += (targetHeading - currentHeading) * 0.1;

            if (isRealCompassActive) {
                compassInner.style.transform = `rotate(${-currentHeading}deg)`;
                sunPathContainer.style.transform = `translate(-50%, -50%) rotate(${-currentHeading}deg)`;
                compassNeedle.style.transform = `translate(-50%, -100%) rotate(0deg)`;
            } else {
                compassInner.style.transform = `rotate(${-currentHeading}deg)`;
                sunPathContainer.style.transform = `translate(-50%, -50%) rotate(${-currentHeading}deg)`;
                compassNeedle.style.transform = `translate(-50%, -100%) rotate(${-currentHeading}deg)`;
            }

            requestAnimationFrame(animateCompass);
        }

        function toggleRealCompass() {
            if (isRealCompassActive) {
                if (window.DeviceOrientationEvent) {
                    window.removeEventListener('deviceorientation', handleOrientation);
                }
                isRealCompassActive = false;
                realCompassBtn.textContent = '🛰️ Brújula Real';
                realCompassBtn.classList.remove('active');
                targetHeading = 0;
            } else {
                if (window.DeviceOrientationEvent) {
                    const startCompass = () => {
                        window.addEventListener('deviceorientation', handleOrientation);
                        isRealCompassActive = true;
                        realCompassBtn.textContent = '🛰️ Brújula Activa';
                        realCompassBtn.classList.add('active');
                        if (!isCompassLoopRunning) {
                            isCompassLoopRunning = true;
                            requestAnimationFrame(animateCompass);
                        }
                    };

                    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                        DeviceOrientationEvent.requestPermission()
                            .then(permissionState => {
                                if (permissionState === 'granted') {
                                    startCompass();
                                } else {
                                    alert('Se necesita permiso para usar la brújula del dispositivo.');
                                }
                            })
                            .catch(console.error);
                    } else {
                        startCompass();
                    }
                } else {
                    alert('Tu dispositivo no soporta la brújula o estás en un entorno sin sensores.');
                }
            }
        }

        function handleOrientation(event) {
            if (event.alpha !== null) {
                targetHeading = event.alpha;
            }
        }

        // --- Event Listeners ---
        animationBtn.addEventListener('click', toggleAnimation);
        dateSlider.addEventListener('input', () => { stopAnimation(); updateDisplay(true); });
        timeSlider.addEventListener('input', () => { stopAnimation(); updateDisplay(); });
        moonToggle.addEventListener('change', () => updateDisplay(true));
        objectHeightSlider.addEventListener('input', () => { stopAnimation(); updateDisplay(true); });
        objectWidthSlider.addEventListener('input', () => { stopAnimation(); updateDisplay(true); });
        map.on('movestart', stopAnimation);
        map.on('moveend', () => updateDisplay(true));
        map.on('zoomend', () => updateDisplay());
        currentLocationBtn.addEventListener('click', getCurrentLocation);
        lockMapBtn.addEventListener('click', toggleMapLock);
        realCompassBtn.addEventListener('click', toggleRealCompass);
        toggleControlsBtn.addEventListener('click', toggleMinimizePanel);
        hidePanelBtn.addEventListener('click', hidePanel);
        showPanelBtn.addEventListener('click', showPanel);
        locationSearchBtn.addEventListener('click', searchLocation);
        locationSearchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') searchLocation(); });
        document.querySelectorAll('.capital-buttons button').forEach(button => { 
            button.addEventListener('click', (e) => { 
                stopAnimation(); 
                map.setView([e.target.dataset.lat, e.target.dataset.lng], 18); 
            }); 
        });

        nowBtn.addEventListener('click', () => {
            stopAnimation();
            const now = new Date();
            dateSlider.value = dateToDayOfYear(now);
            timeSlider.value = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
            updateDisplay(true);
        });

        legendToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            domeLegend.classList.toggle('collapsed');
            legendToggle.textContent = domeLegend.classList.contains('collapsed') ? '▸' : '▾';
        });
        domeLegend.addEventListener('click', (e) => {
            if (e.target === legendToggle) return;
            domeLegend.classList.toggle('collapsed');
            legendToggle.textContent = domeLegend.classList.contains('collapsed') ? '▸' : '▾';
        });

        const hideTooltip = () => {
            domeTooltip.style.display = 'none';
            domeHoverDot.style.display = 'none';
        };

        const findNearestPoint = (mx, my) => {
            let best = null;
            let bestDist = Infinity;
            const consider = (arr, kind) => {
                for (const p of arr) {
                    const d = Math.hypot(p.sx - mx, p.sy - my);
                    if (d < bestDist) { bestDist = d; best = { p, kind }; }
                }
            };
            consider(currentDomeData.sun, 'sun');
            if (moonToggle.checked) consider(currentDomeData.moon, 'moon');
            return bestDist < 18 ? best : null;
        };

        const showTooltipAt = (clientX, clientY) => {
            const rect = sunPathContainer.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            let rx = clientX - cx;
            let ry = clientY - cy;
            if (isRealCompassActive || Math.abs(currentHeading) > 0.5) {
                const a = currentHeading * Math.PI / 180;
                const cosA = Math.cos(a), sinA = Math.sin(a);
                const nrx = rx * cosA - ry * sinA;
                const nry = rx * sinA + ry * cosA;
                rx = nrx; ry = nry;
            }
            const mx = rx + rect.width / 2;
            const my = ry + rect.height / 2;
            const hit = findNearestPoint(mx, my);
            if (!hit) { hideTooltip(); return; }
            const { p, kind } = hit;
            domeHoverDot.style.display = 'block';
            domeHoverDot.style.left = `${p.sx}px`;
            domeHoverDot.style.top = `${p.sy}px`;
            domeHoverDot.classList.toggle('moon', kind === 'moon');
            domeTooltip.classList.toggle('moon', kind === 'moon');
            const hh = p.date.getHours().toString().padStart(2, '0');
            const mm = p.date.getMinutes().toString().padStart(2, '0');
            ttTitle.textContent = kind === 'sun' ? `☀ Sol · ${hh}:${mm}` : `☽ Luna · ${hh}:${mm}`;
            ttBody.innerHTML = `Altura: <b>${p.alt.toFixed(1)}°</b><br>Acimut: <b>${p.az.toFixed(1)}°</b>`;
            domeTooltip.style.left = `${p.sx}px`;
            domeTooltip.style.top = `${p.sy}px`;
            domeTooltip.style.display = 'block';
        };

        sunPathContainer.addEventListener('mousemove', (e) => showTooltipAt(e.clientX, e.clientY));
        sunPathContainer.addEventListener('mouseleave', hideTooltip);
        sunPathContainer.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) showTooltipAt(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        sunPathContainer.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) showTooltipAt(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });
        sunPathContainer.addEventListener('touchend', hideTooltip);

        let saveLocationTimer = null;
        const saveLocation = () => {
            if (saveLocationTimer) clearTimeout(saveLocationTimer);
            saveLocationTimer = setTimeout(() => {
                try {
                    const c = map.getCenter();
                    localStorage.setItem('simSombras_loc', JSON.stringify({ lat: c.lat, lng: c.lng, zoom: map.getZoom() }));
                } catch (err) {}
            }, 600);
        };
        const loadLocation = () => {
            try {
                const raw = localStorage.getItem('simSombras_loc');
                if (!raw) return false;
                const d = JSON.parse(raw);
                if (typeof d.lat === 'number' && typeof d.lng === 'number') {
                    map.setView([d.lat, d.lng], d.zoom || 18);
                    return true;
                }
            } catch (err) {}
            return false;
        };
        map.on('moveend', saveLocation);
        map.on('zoomend', saveLocation);

        function initialize() {
            const initialDate = new Date();
            dateSlider.value = dateToDayOfYear(initialDate);
            timeSlider.value = initialDate.getHours() + initialDate.getMinutes() / 60;
            createObject();
            initPanelDrag();
            loadLocation();
            updateDisplay(true);
        }

        initialize();
    </script>
</body>
</html>
